            box-shadow: 0px 0px 0px 0px #0A0A0A;
        }
        
        .blease-input {
            border: 4px solid #0A0A0A;

                            <button type="submit" className="blease-btn bg-white w-full py-4 text-lg">Akte entsperren</button>
                        </form>
                    </div>
                </div>
            );

            const renderCharSheet = () => (
                <div className="max-w-2xl mx-auto mt-8">
                    <button onClick={() => setView('home')} className="blease-btn bg-white px-4 py-2 mb-8 text-sm">&larr; Menü</button>
                    
                    <div className={`blease-box ${selectedChar.color} p-6 md:p-10 relative overflow-hidden`}>
                        <div className="absolute top-4 right-4 font-script font-bold text-xl bg-white border-2 border-black px-2 py-1 transform rotate-6">TOP SECRET</div>
                        
                        <h2 className="text-5xl font-black uppercase mb-2" style={{ textShadow: '2px 2px 0px white' }}>{selectedChar.name}</h2>
                        <h3 className="font-script text-xl font-bold mb-8 bg-white border-2 border-black px-2 py-1 inline-block">{selectedChar.role}</h3>
                        
                        <div className="bg-white p-6 border-4 border-black mb-6 shadow-[4px_4px_0_0_#0A0A0A]">
                            <h4 className="font-black uppercase text-xl mb-2">🎭 Die Fassade</h4>
                            <p className="font-script font-bold">{selectedChar.public}</p>
                        </div>
                        
                        <div className="bg-blease-yellow p-6 border-4 border-black mb-6 shadow-[4px_4px_0_0_#0A0A0A] transform -rotate-1">
                            <h4 className="font-black uppercase text-xl mb-2">🤥 Deine Alibi-Lüge</h4>
                            <p className="font-script font-bold text-lg">{selectedChar.alibi}</p>
                            <p className="text-sm mt-3 uppercase font-bold border-t-2 border-black pt-2 tracking-wider">
                                Behaupte das in Szene 1 bis 3! Lerne es auswendig.
                            </p>
                        </div>

                        <div className="bg-[#0A0A0A] text-white p-6 border-4 border-black mb-6 shadow-[4px_4px_0_0_#EF476F]">
                            <h4 className="font-black uppercase text-xl mb-2 text-blease-pink">💔 Dein wahres Geheimnis (Nicht verraten!)</h4>
                            <p className="font-script font-bold text-lg leading-relaxed text-gray-200">{selectedChar.secret}</p>
                            <p className="text-xs mt-4 text-blease-yellow uppercase font-bold border-t border-gray-700 pt-2 font-sans tracking-wide">
                                🎬 Regieanweisung: Erst in Szene 4 verraten! Davor wird nur gelogen.
                            </p>
                        </div>

                        <div className="bg-white p-6 border-4 border-black border-dashed">
                            <h4 className="font-black uppercase text-xl mb-2">🎯 Dein Ziel für heute</h4>
                            <p className="font-script font-bold">{selectedChar.goal}</p>
                        </div>
                    </div>
                </div>
            );

            const renderGM = () => (
                <div className="max-w-3xl mx-auto mt-8">
                    <button onClick={() => setView('home')} className="font-bold border-b-4 border-black mb-8 uppercase">&larr; Zurück</button>
                    
                    <div className="text-center mb-8">
                        <IconDiscoKran />
                        <h2 className="text-4xl font-black uppercase mt-4">Das Skript</h2>
                        <p className="font-script font-bold mt-2">Lies die Anweisungen laut vor und führe Regie.</p>
                    </div>

                    <div className="blease-box bg-white p-6 md:p-8 relative">
                        <div className="clapper-border h-6 w-full absolute top-0 left-0"></div>
                        
                        <div className="mt-8 mb-6">
                            <span className="bg-blease-pink text-white border-2 border-black px-3 py-1 font-black text-xl">
                                AKT {gmPhase + 1} / {STORY_PHASES.length}
                            </span>
                            <h3 className="text-3xl font-black uppercase mt-4">{STORY_PHASES[gmPhase].title}</h3>
                        </div>
                        
                        {/* Regie Anweisungen im "Textmarker" / Notizzettel Look */}
                        <div className="bg-blease-yellow border-4 border-black p-4 mb-6 transform -rotate-1 shadow-[4px_4px_0_0_#0A0A0A]">
                            <h4 className="font-black uppercase text-sm border-b-2 border-black pb-1 mb-2">🎬 Regie-Anweisungen (Laut vorlesen)</h4>
                            <p className="font-script font-bold text-[15px] mb-3">
                                <strong>🎵 Musik:</strong> {STORY_PHASES[gmPhase].regie_music}
                            </p>
                            <p className="font-script font-bold text-[15px]">
                                <strong>🎭 Action:</strong> {STORY_PHASES[gmPhase].regie_act}
                        {STORY_PHASES[gmPhase].clues && (
                            <div className="mt-6 bg-white border-4 border-black p-4 shadow-[4px_4px_0_0_#0A0A0A] transform rotate-1">
                                <h4 className="font-black uppercase text-lg border-b-2 border-black pb-1 mb-3 text-blease-pink">🔍 Gefundene Indizien (Vorlesen!)</h4>
                                <ul className="space-y-3 font-script font-bold text-[15px]">
                                    {STORY_PHASES[gmPhase].clues.map((clue, i) => (
                                        <li key={i} className="flex">
                                            <span className="mr-2">👉</span> 
                                            <span>{clue}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                        
                            </p>
                        </div>

                        {/* Story Text im echten Drehbuch Look */}
                        <div className="font-script text-lg leading-relaxed p-6 border-l-4 border-black bg-gray-50 whitespace-pre-line">
                            {STORY_PHASES[gmPhase].content}
                        </div>
                        
                        <div className="flex justify-between mt-10 pt-6 border-t-4 border-black">
                            <button 
                                onClick={() => setGmPhase(p => Math.max(0, p - 1))}
                                disabled={gmPhase === 0}
                                className="blease-btn bg-white px-6 py-3 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                                Zurück
                            </button>
                            
                            {gmPhase < STORY_PHASES.length - 1 ? (
                                <button 
                                    onClick={() => setGmPhase(p => p + 1)}
                                    className="blease-btn bg-blease-blue text-white px-6 py-3 text-sm">
                                    Nächste Szene &rarr;
                                </button>
                            ) : (
                                <button 
                                    onClick={() => setView('resolution')}
                                    className="blease-btn bg-blease-pink text-white px-6 py-3 animate-pulse text-sm">
                                    Auflösung
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderResolution = () => (
                <div className="max-w-2xl mx-auto mt-8 text-center">
                    <h2 className="text-5xl font-black uppercase mb-8 text-blease-pink" style={{ textShadow: '4px 4px 0px #0A0A0A' }}>Der Exitus des Authentischen</h2>
                    
                    <div className="blease-box bg-white p-8 text-left">
                        <h3 className="text-3xl font-black uppercase mb-4 border-b-4 border-black pb-2">Die poetische Wahrheit</h3>
                        
                        <p className="text-xl font-script font-bold mb-6">
                            Der Tänzer im Nebel der Gier war <span className="bg-blease-yellow px-2 border-2 border-black font-sans font-black uppercase text-2xl ml-1 shadow-[2px_2px_0_0_#0A0A0A]">Justus!</span>
                        </p>
                        <p className="font-script font-bold mb-4">
                            Es ist die banale Tragik des Spätkapitalismus. Justus wollte den Raum, das Kapital, die hippe, durchdesignte Leere eines Matcha-Cafés. Doch als Hilde ihn im Mondlicht auslachte, ihn seelenlos nannte – einen bloßen Businessplan auf zwei Beinen –, zerbrach sein fragiles, auf Hafermilch gebautes Ego. Ein kurzes, brutales Handgemenge. Hilde stürzte in die antike Schneiderschere. Vintage-Seide, getränkt in Echtblut.
                        </p>
                        <p className="font-script font-bold mb-4">
                            Und dann? Der absolute Wahnsinn der Ästhetisierung. Panik wird zur Performance. In einem tränenblinden Anflug von romantisierendem Wahnsinn drapiert er die Leiche, wuchtet sie ins Urban-Mobility-Gefährt – sein gigantisches E-Lastenrad – und pedaliert weinend durch die regennasse Nacht zum Bahnwärter Thiel. Am Kran der Diskokugel inszeniert er ihren Abgang als morbid-episches Kunstwerk. Er ist kein eiskalter Mörder. Er ist nur der lächerlichste, tragischste Regisseur seines eigenen, pathetischen Untergangs.
                        </p>
                        
                        <div className="bg-[#0A0A0A] text-white p-4 mt-8 border-4 border-blease-pink shadow-[6px_6px_0_0_#EF476F]">
                            <p className="font-black uppercase text-center text-blease-yellow mb-2 tracking-widest">Director's Cut (Alternativ, ohne Justus):</p>
                            <p className="font-script font-bold text-sm text-center">
                                Herr Taaks dechiffriert das Nichts. Es war die Mafia. Osteuropa. Das Syndikat. Hilde zahlte Leos Schulden mit dem ultimativen Währungsmittel: Leben. Der Kran war kein Kunstwerk. Er war eine Quittung. Die Kälte der reinen Struktur. Niemand legt sich mit dem Syndikat an.
                            </p>
                        </div>
                    </div>
                    <button onClick={() => { setView('home'); setGmPhase(0); }} className="blease-btn bg-blease-blue text-white mt-12 px-10 py-5 text-xl">Applaus & Abspann</button>
                </div>
            );

            const renderIntro = () => (
                <div className="max-w-3xl mx-auto mt-8">
                    <button onClick={() => setView('home')} className="font-bold border-b-4 border-black mb-8 hover:text-blease-pink uppercase">&larr; Zurück zum Set</button>
                    <h2 className="text-4xl font-black uppercase mb-8 text-center bg-white border-4 border-black py-2 shadow-[6px_6px_0_0_#0A0A0A]">Spielanleitung</h2>
                    <div className="space-y-6">
                        <div className="blease-box bg-white p-6">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-black inline-block">1. Rollenwahl</h3>
                            <p className="font-script font-bold text-lg mt-2">Jeder wählt eine Rolle aus und verwendet das Passwort, um seine private Akte freizuschalten. Lest nur eure eigene Akte! Jeder hat ein "Fassaden"-Alibi und ein dunkles Geheimnis.</p>
                        </div>
                        <div className="blease-box bg-blease-pink text-white p-6 transform rotate-1">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-white inline-block">2. Lügen & Schweigen</h3>
                            <p className="font-script font-bold text-lg mt-2">In den ersten drei Szenen bleibt euer dunkles Geheimnis streng geheim! Nutzt nur eure "Alibi-Lüge". Erst in Szene 4 fallen die Masken und die wahren Geheimnisse kommen auf den Tisch.</p>
                        </div>
                        <div className="blease-box bg-blease-yellow p-6 transform -rotate-1 shadow-[4px_4px_0_0_#0A0A0A]">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-black inline-block">3. Das Skript (Regie)</h3>
                            <p className="font-script font-bold text-lg mt-2">Ein Spieler (oder alle zusammen) klickt sich auf der Startseite durch "Das Skript". Lest die Regieanweisungen vor, folgt den Szenen. Das Skript gibt den Takt des Spiels vor.</p>
                        </div>
                        <div className="blease-box bg-white p-6">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-black inline-block">4. Das Finale</h3>
                            <p className="font-script font-bold text-lg mt-2">In Szene 5 habt ihr 5 Minuten Zeit, gemeinsam zu diskutieren und abzustimmen, wer die Tat begangen hat. Möge der beste Lügner gewinnen!</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="pb-20">
                    {view === 'home' && renderHome()}
                    {view === 'intro' && renderIntro()}
                    {view === 'charSelect' && renderCharSelect()}
                    {view === 'charLogin' && renderCharLogin()}
                    {view === 'charSheet' && renderCharSheet()}
                    {view === 'gm' && renderGM()}
                    {view === 'resolution' && renderResolution()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
