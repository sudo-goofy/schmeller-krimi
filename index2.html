        // --- COUNTDOWN TIMER (Szene 5) ---
        const CountdownTimer = ({ seconds = 300 }) => {
            const [remaining, setRemaining] = useState(seconds);
            const [running, setRunning] = useState(false);

            useEffect(() => {
                if (!running) return;
                const t = setInterval(() => {
                    setRemaining(r => (r <= 1 ? 0 : r - 1));
                }, 1000);
                return () => clearInterval(t);
            }, [running]);

            useEffect(() => {
                if (remaining === 0) setRunning(false);
            }, [remaining]);

            const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
            const ss = String(remaining % 60).padStart(2, '0');
            const done = remaining === 0;

            return (
                <div className={`border-4 border-black p-4 mb-6 text-center shadow-[6px_6px_0_0_#0A0A0A] ${done ? 'bg-blease-pink animate-pulse' : 'bg-[#0A0A0A]'}`}>
                    <p className="font-black uppercase tracking-widest text-xs mb-1 text-white">⏳ Tribunal-Countdown</p>
                    <div className={`font-script font-black text-6xl tracking-tighter ${done ? 'text-white' : 'text-blease-yellow'}`}>
                        {done ? 'ZEIT UM!' : `${mm}:${ss}`}
                    </div>
                    <div className="flex gap-3 justify-center mt-4">
                        <button onClick={() => setRunning(r => !r)} className="blease-btn bg-blease-green px-5 py-2 text-sm">
                            {running ? '⏸ Pause' : '▶ Start'}
                        </button>
                        <button onClick={() => { setRunning(false); setRemaining(seconds); }} className="blease-btn bg-white px-5 py-2 text-sm">
                            ↺ Reset
                        </button>
                    </div>
                </div>
            );
        };

                                placeholder="Geheimcode"
                            />
                            {pwdError && <p className="text-white font-script font-bold bg-red-600 inline-block px-2 border-2 border-black transform rotate-2">Falsch! Schnitt, nochmal!</p>}
                            <button type="submit" className="blease-btn bg-white w-full py-4 text-lg">Akte entsperren</button>
                        </form>
                    </div>
                </div>
            );

            const renderCharSheet = () => (
                <div className="max-w-2xl mx-auto mt-8">
                    <button onClick={() => setView('home')} className="blease-btn bg-white px-4 py-2 mb-8 text-sm">&larr; Menü</button>
                    
                    <div className={`blease-box ${selectedChar.color} p-6 md:p-10 relative overflow-hidden`}>
                        <div className="absolute top-4 right-4 font-script font-bold text-xl bg-white border-2 border-black px-2 py-1 transform rotate-6">TOP SECRET</div>
                        
                        <h2 className="text-5xl font-black uppercase mb-2" style={{ textShadow: '2px 2px 0px white' }}>{selectedChar.name}</h2>
                        <h3 className="font-script text-xl font-bold mb-8 bg-white border-2 border-black px-2 py-1 inline-block">{selectedChar.role}</h3>
                        
                        <div className="bg-white p-6 border-4 border-black mb-6 shadow-[4px_4px_0_0_#0A0A0A]">
                            <h4 className="font-black uppercase text-xl mb-2">🎭 Die Fassade</h4>
                            <p className="font-script font-bold">{selectedChar.public}</p>
                        </div>
                        
                        <div className="bg-blease-yellow p-6 border-4 border-black mb-6 shadow-[4px_4px_0_0_#0A0A0A] transform -rotate-1">
                            <h4 className="font-black uppercase text-xl mb-2">🤥 Deine Alibi-Lüge</h4>
                            <p className="font-script font-bold text-lg">{selectedChar.alibi}</p>
                            <p className="text-sm mt-3 uppercase font-bold border-t-2 border-black pt-2 tracking-wider">
                                Behaupte das in Szene 1 bis 3! Lerne es auswendig.
                            </p>
                        </div>

                        <div className="bg-[#0A0A0A] text-white p-6 border-4 border-black mb-6 shadow-[4px_4px_0_0_#EF476F]">
                            <h4 className="font-black uppercase text-xl mb-2 text-blease-pink">💔 Dein wahres Geheimnis (Nicht verraten!)</h4>
                            <p className="font-script font-bold text-lg leading-relaxed text-gray-200">{selectedChar.secret}</p>
                            <p className="text-xs mt-4 text-blease-yellow uppercase font-bold border-t border-gray-700 pt-2 font-sans tracking-wide">
                                🎬 Regieanweisung: Erst in Szene 4 verraten! Davor wird nur gelogen.
                            </p>
                        </div>

                        <div className="bg-white p-6 border-4 border-black border-dashed">
                            <h4 className="font-black uppercase text-xl mb-2">🎯 Dein Ziel für heute</h4>
                            <p className="font-script font-bold">{selectedChar.goal}</p>
                        </div>
                    </div>
                </div>
            );

            const renderGM = () => (
                <div className="max-w-3xl mx-auto mt-8">
                    <button onClick={() => setView('home')} className="font-bold border-b-4 border-black mb-8 uppercase">&larr; Zurück</button>
                    
                    <div className="text-center mb-8">
                        <IconDiscoKran />
                        <h2 className="text-4xl font-black uppercase mt-4">Das Skript</h2>
                        <p className="font-script font-bold mt-2">Lies die Anweisungen laut vor und führe Regie.</p>
                    </div>

                    <div className="blease-box bg-white p-6 md:p-8 relative">
                        <div className="clapper-border h-6 w-full absolute top-0 left-0"></div>
                        
                        <div className="mt-8 mb-6">
                            <span className="bg-blease-pink text-white border-2 border-black px-3 py-1 font-black text-xl">
                                AKT {gmPhase + 1} / {STORY_PHASES.length}
                            </span>
                            <h3 className="text-3xl font-black uppercase mt-4">{STORY_PHASES[gmPhase].title}</h3>
                        </div>
                        
                        {/* Regie Anweisungen im "Textmarker" / Notizzettel Look */}
                        <div className="bg-blease-yellow border-4 border-black p-4 mb-6 transform -rotate-1 shadow-[4px_4px_0_0_#0A0A0A]">
                            <h4 className="font-black uppercase text-sm border-b-2 border-black pb-1 mb-2">🎬 Regie-Anweisungen (Laut vorlesen)</h4>
                            <p className="font-script font-bold text-[15px] mb-3">
                                <strong>🎵 Musik:</strong> {STORY_PHASES[gmPhase].regie_music}
                            </p>
                            <p className="font-script font-bold text-[15px]">
                                <strong>🎭 Action:</strong> {STORY_PHASES[gmPhase].regie_act}
                            </p>
                        </div>

                        {STORY_PHASES[gmPhase].clues && (
                            <div className="bg-white border-4 border-black p-4 mb-6 shadow-[4px_4px_0_0_#0A0A0A] transform rotate-1">
                                <h4 className="font-black uppercase text-lg border-b-2 border-black pb-1 mb-3 text-blease-pink">🔍 Gefundene Indizien (Vorlesen!)</h4>
                                <ul className="space-y-3 font-script font-bold text-[15px]">
                                    {STORY_PHASES[gmPhase].clues.map((clue, i) => (
                                        <li key={i} className="flex">
                                            <span className="mr-2">👉</span>
                                            <span>{clue}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        {/* Story Text im echten Drehbuch Look */}
                        <div className="font-script text-lg leading-relaxed p-6 border-l-4 border-black bg-gray-50 whitespace-pre-line">
                            {STORY_PHASES[gmPhase].content}
                        </div>

                        {gmPhase === STORY_PHASES.length - 1 && (
                            <div className="mt-8">
                                <CountdownTimer seconds={300} />
                            </div>
                        )}
                        
                        <div className="flex justify-between mt-10 pt-6 border-t-4 border-black">
                            <button 
                                onClick={() => setGmPhase(p => Math.max(0, p - 1))}
                                disabled={gmPhase === 0}
                                className="blease-btn bg-white px-6 py-3 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                                Zurück
                            </button>
                            
                            {gmPhase < STORY_PHASES.length - 1 ? (
                                <button 
                                    onClick={() => setGmPhase(p => p + 1)}
                                    className="blease-btn bg-blease-blue text-white px-6 py-3 text-sm">
                                    Nächste Szene &rarr;
                                </button>
                            ) : (
                                <button 
                                    onClick={() => setView('tribunal')}
                                    className="blease-btn bg-blease-pink text-white px-6 py-3 animate-pulse text-sm">
                                    Zum Tribunal ⚖️
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderResolution = () => {
                const accused = CHARACTERS.find(c => c.id === accusedId);
                const correct = accusedId === 'gerd';
                let oscarId = null, oscarN = 0;
                CHARACTERS.forEach(c => { const n = oscarVotes[c.id] || 0; if (n > oscarN) { oscarN = n; oscarId = c.id; } });
                const oscar = oscarN > 0 ? CHARACTERS.find(c => c.id === oscarId) : null;

                return (
                <div className="max-w-2xl mx-auto mt-8 text-center">
                    <div className={`border-4 border-black p-4 mb-8 shadow-[6px_6px_0_0_#0A0A0A] ${correct ? 'bg-blease-green' : 'bg-blease-pink text-white'}`}>
                        <p className="font-black uppercase tracking-widest text-sm">{correct ? '✅ Schuldspruch' : '⚖️ Justizirrtum'}</p>
                        <p className="font-black uppercase text-3xl leading-none mt-1">{accused ? `Angeklagt: ${accused.name}` : 'Kein Urteil'}</p>
                    </div>

                    <h2 className="text-5xl font-black uppercase mb-8 text-blease-pink" style={{ textShadow: '4px 4px 0px #0A0A0A' }}>Das Ende der Idylle</h2>

                    <div className="blease-box bg-white p-8 text-left">
                        {correct ? (
                        <>
                        <h3 className="text-3xl font-black uppercase mb-4 border-b-4 border-black pb-2">Ihr habt ihn entlarvt.</h3>

                        <p className="text-xl font-script font-bold mb-6">
                            Der graue Mann hinter den Büchern war <span className="bg-blease-yellow px-2 border-2 border-black font-sans font-black uppercase text-2xl ml-1 shadow-[2px_2px_0_0_#0A0A0A]">Gerd!</span> Und ihr habt mit dem Gartenhandschuh auf ihn gezeigt.
                        </p>
                        <p className="font-script font-bold mb-4">
                            Es ist die banale Tragik der Vereinsmeierei. Fünfundzwanzig Jahre lang zählte Gerd treu jeden Cent – und zweigte heimlich jeden zweiten ab, um die Schulden seiner gescheiterten Koi-Karpfen-Firma zu stopfen. Als Reinhard am Komposter das Loch in den Büchern aufdeckte und mit der großen Enthüllung bei der Ehrung drohte, zerbrach Gerds einzige Währung: seine Ehrbarkeit. Ein Flehen. Ein Lachen. Ein Stoß. Und der gusseiserne Wanderpokal tat den Rest.
                        </p>
                        <p className="font-script font-bold mb-4">
                            Und dann? Die Pedanterie der Vertuschung. Mit zitternden Händen wischte er den Pokal blank, riss die belastenden Seiten aus dem Kassenbuch und vergrub sie im prämierten Kompost. Zum Schluss stellte er einen Gartenzwerg auf – als sei der eiserne Vorsitzende bloß über die eigene Idylle gestolpert. Kein kaltblütiger Killer. Nur ein kleiner Mann, dessen Bilanz nicht mehr aufging.
                        </p>
                        </>
                        ) : (
                        <>
                        <h3 className="text-3xl font-black uppercase mb-4 border-b-4 border-black pb-2">Das Bauernopfer</h3>

                        <p className="text-xl font-script font-bold mb-6">
                            Ihr habt <span className="bg-blease-pink text-white px-2 border-2 border-black font-sans font-black uppercase text-2xl ml-1 shadow-[2px_2px_0_0_#0A0A0A]">{accused ? accused.name : '—'}</span> der Gartenordnung zum Fraß vorgeworfen.
                        </p>
                        <p className="font-script font-bold mb-4">
                            {accused ? accused.name : 'Diese Person'}s Geheimnis war kleinlich, peinlich, voller Schuld – aber es war <strong>kein Mord</strong>. Ihr habt euch ein bequemes Bauernopfer gesucht, um den eigenen, gepflegten Rasen rein zu halten. Genau davor warnte das Standgericht. Die Kolonie frisst ihre Sonderlinge zuerst.
                        </p>
                        <p className="font-script font-bold mb-4">
                            Denn während ihr mit dem Gartenhandschuh auf eine bequeme Lüge zeigtet, zählte der wahre Täter längst wieder seelenruhig die Kasse: <strong>Gerd, der Kassenwart.</strong> Reinhard hatte die veruntreuten Tausende in den Büchern entdeckt; am Komposter stieß Gerd ihn in Panik gegen den gusseisernen Wanderpokal, vergrub die Kassenbuch-Seiten im Kompost und stellte einen Gartenzwerg als Stolperfalle auf. Und jetzt? Unbehelligt. Die Bücher bleiben geschlossen, und nächste Woche zählt er wieder treu jeden Cent.
                        </p>
                        </>
                        )}

                        <div className="bg-[#0A0A0A] text-white p-4 mt-8 border-4 border-blease-pink shadow-[6px_6px_0_0_#EF476F]">
                            <p className="font-black uppercase text-center text-blease-yellow mb-2 tracking-widest">Director's Cut (Alternativ, ohne Gerd):</p>
                            <p className="font-script font-bold text-sm text-center">
                                Es war niemand. Reinhard, sturzbetrunken vom selbstgebrannten Mirabellenschnaps, stolperte über seinen eigenen Lieblings-Gartenzwerg und stürzte in den Kompost. Die Gartenordnung kennt keinen Paragrafen gegen die Schwerkraft. Doch ein Verein braucht einen Schuldigen – denn einen Unfall kann man nicht abmahnen.
                            </p>
                        </div>
                    </div>

                    {oscar && (
                        <div className="blease-box bg-blease-yellow p-4 mt-8 inline-block transform -rotate-1">
                            <p className="font-black uppercase text-sm">🏆 Goldene Kelle – Bester Lügner</p>
                            <p className="font-black uppercase text-3xl">{oscar.name}</p>
                        </div>
                    )}

                    <button onClick={() => { setView('home'); setGmPhase(0); setVotes({}); setOscarVotes({}); setAccusedId(null); }} className="blease-btn bg-blease-blue text-white mt-12 px-10 py-5 text-xl block mx-auto">Applaus & Abspann</button>
                </div>
                );
            };

            const renderTribunal = () => {
                const total = Object.values(votes).reduce((a, b) => a + b, 0);
                let leaderId = null, leaderN = 0;
                CHARACTERS.forEach(c => { const n = votes[c.id] || 0; if (n > leaderN) { leaderN = n; leaderId = c.id; } });

                let oscarLeadId = null, oscarLeadN = 0;
                CHARACTERS.forEach(c => { const n = oscarVotes[c.id] || 0; if (n > oscarLeadN) { oscarLeadN = n; oscarLeadId = c.id; } });

                return (
                <div className="max-w-4xl mx-auto mt-8">
                    <button onClick={() => setView('gm')} className="font-bold border-b-4 border-black mb-6 uppercase">&larr; Zurück zur Szene</button>

                    <div className="text-center mb-6">
                        <h2 className="text-5xl font-black uppercase text-blease-pink" style={{ textShadow: '4px 4px 0px #0A0A0A' }}>⚖️ Das Tribunal</h2>
                        <p className="font-script font-bold mt-3 bg-white border-4 border-black inline-block px-4 py-2 shadow-[4px_4px_0_0_#0A0A0A] transform -rotate-1">
                            Auf 3 zeigen alle mit dem Finger. Tippt jede Stimme ein – die meisten Finger entscheiden.
                        </p>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                        {CHARACTERS.map(c => {
                            const n = votes[c.id] || 0;
                            const isLeader = leaderId === c.id && n > 0;
                            return (
                                <div key={c.id}
                                    onClick={() => setVotes(v => ({ ...v, [c.id]: (v[c.id] || 0) + 1 }))}
                                    className={`blease-box ${c.color} p-4 cursor-pointer relative ${isLeader ? 'ring-4 ring-blease-pink -translate-y-1' : ''}`}>
                                    {isLeader && <div className="absolute -top-4 -right-3 text-4xl">👑</div>}
                                    <h3 className="text-xl font-black uppercase leading-none">{c.name}</h3>
                                    <p className="font-script font-bold text-xs mt-1 leading-tight">{c.role}</p>
                                    <div className="flex items-center justify-between mt-3 border-t-2 border-black pt-2">
                                        <span className="font-black text-4xl">{n}</span>
                                        <div className="flex gap-1">
                                            <button onClick={(e) => { e.stopPropagation(); setVotes(v => ({ ...v, [c.id]: Math.max(0, (v[c.id] || 0) - 1) })); }} className="w-9 h-9 border-2 border-black bg-white font-black text-xl leading-none">–</button>
                                            <button onClick={(e) => { e.stopPropagation(); setVotes(v => ({ ...v, [c.id]: (v[c.id] || 0) + 1 })); }} className="w-9 h-9 border-2 border-black bg-white font-black text-xl leading-none">+</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="flex flex-wrap gap-4 justify-between items-center mb-12">
                        <button onClick={() => setVotes({})} className="blease-btn bg-white px-5 py-3 text-sm">↺ Stimmen zurücksetzen</button>
                        <button
                            disabled={total === 0}
                            onClick={() => { setAccusedId(leaderId); setView('resolution'); }}
                            className="blease-btn bg-blease-pink text-white px-8 py-4 text-lg disabled:opacity-40 disabled:cursor-not-allowed">
                            ⚖️ Urteil verkünden &rarr;
                        </button>
                    </div>

                    <div className="blease-box bg-white p-5">
                        <h3 className="text-2xl font-black uppercase mb-1">🏆 Goldene Kelle</h3>
                        <p className="font-script font-bold text-sm mb-4">Optional: Wer hat am schamlosesten gelogen? Kürt euren Lieblings-Schauspieler (ohne Einfluss auf den Fall).</p>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                            {CHARACTERS.map(c => {
                                const n = oscarVotes[c.id] || 0;
                                const win = oscarLeadId === c.id && n > 0;
                                return (
                                    <button key={c.id}
                                        onClick={() => setOscarVotes(v => ({ ...v, [c.id]: (v[c.id] || 0) + 1 }))}
                                        className={`border-2 border-black px-2 py-2 text-sm font-bold ${win ? 'bg-blease-yellow' : 'bg-white'}`}>
                                        {win && '⭐ '}{c.name} ({n})
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
                );
            };

            const renderIntro = () => (
                <div className="max-w-3xl mx-auto mt-8">
                    <button onClick={() => setView('home')} className="font-bold border-b-4 border-black mb-8 hover:text-blease-pink uppercase">&larr; Zurück zum Set</button>
                    <h2 className="text-4xl font-black uppercase mb-8 text-center bg-white border-4 border-black py-2 shadow-[6px_6px_0_0_#0A0A0A]">Spielanleitung</h2>
                    <div className="space-y-6">
                        <div className="blease-box bg-white p-6">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-black inline-block">1. Rollenwahl</h3>
                            <p className="font-script font-bold text-lg mt-2">Jeder wählt eine Rolle aus und verwendet das Passwort, um seine private Akte freizuschalten. Lest nur eure eigene Akte! Jeder hat ein "Fassaden"-Alibi und ein dunkles Geheimnis.</p>
                        </div>
                        <div className="blease-box bg-blease-pink text-white p-6 transform rotate-1">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-white inline-block">2. Lügen & Schweigen</h3>
                            <p className="font-script font-bold text-lg mt-2">In den ersten drei Szenen bleibt euer dunkles Geheimnis streng geheim! Nutzt nur eure "Alibi-Lüge". Erst in Szene 4 fallen die Masken und die wahren Geheimnisse kommen auf den Tisch.</p>
                        </div>
                        <div className="blease-box bg-blease-yellow p-6 transform -rotate-1 shadow-[4px_4px_0_0_#0A0A0A]">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-black inline-block">3. Das Skript (Regie)</h3>
                            <p className="font-script font-bold text-lg mt-2">Ein Spieler (oder alle zusammen) klickt sich auf der Startseite durch "Das Skript". Lest die Regieanweisungen vor, folgt den Szenen. Das Skript gibt den Takt des Spiels vor.</p>
                        </div>
                        <div className="blease-box bg-white p-6">
                            <h3 className="text-2xl font-black uppercase mb-2 border-b-4 border-black inline-block">4. Das Finale</h3>
                            <p className="font-script font-bold text-lg mt-2">In Szene 5 habt ihr 5 Minuten Zeit, gemeinsam zu diskutieren und abzustimmen, wer die Tat begangen hat. Möge der beste Lügner gewinnen!</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="pb-20">
                    {view === 'home' && renderHome()}
                    {view === 'intro' && renderIntro()}
                    {view === 'charSelect' && renderCharSelect()}
                    {view === 'charLogin' && renderCharLogin()}
                    {view === 'charSheet' && renderCharSheet()}
                    {view === 'gm' && renderGM()}
                    {view === 'tribunal' && renderTribunal()}
                    {view === 'resolution' && renderResolution()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
